<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Cross-origin isolation shim (GitLab Pages cannot set COOP/COEP headers). -->
    <script src="../coi-serviceworker.js"></script>
    <meta charset="UTF-8">
    <title>gafrojs · point constraints</title>
    <style>
        html, body { margin: 0; height: 100%; overflow: hidden; font-family: system-ui, sans-serif; }
        #viewer { position: absolute; inset: 0; }
        #panel {
            position: absolute; top: 8px; left: 8px; z-index: 1;
            background: rgba(255,255,255,0.85); padding: 6px 10px;
            border-radius: 4px; font-size: 12px;
        }
        #hint { color: #444; }
        select { font-size: 12px; }
    </style>
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
        }
    }
    </script>
</head>
<body>
    <div id="panel">
        <strong>point constraints</strong>
        <select id="target">
            <option value="sphere">point-on-sphere</option>
            <option value="plane">point-on-plane</option>
            <option value="line">point-on-line</option>
        </select>
        · <span id="hint"></span>
    </div>
    <div id="viewer"></div>
    <script type="module">
        import { loadGafro, Viewer, examples } from '../gafro.js';
        const gafro = await loadGafro();
        const viewer = new Viewer('viewer', { cameraPosition: [1.8, 1.8, 1.4] });
        viewer.start();

        const sel = document.getElementById('target');
        const hint = document.getElementById('hint');
        let current = null;
        async function rebuild() {
            if (current) current.dispose();
            current = await examples.pointConstraints(gafro, viewer, { controls: hint, target: sel.value });
        }
        sel.addEventListener('change', rebuild);
        await rebuild();
    </script>
</body>
</html>
